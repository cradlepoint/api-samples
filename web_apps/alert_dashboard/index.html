<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
:root {
    --primary-color: #4f46e5;
    --primary-dark: #3730a3;
    --secondary-color: #6b7280;
    --success-color: #059669;
    --warning-color: #d97706;
    --danger-color: #dc2626;
    --info-color: #0284c7;
    --dark-bg: #111827;
    --dark-surface: #1f2937;
    --light-bg: #f9fafb;
    --light-surface: #ffffff;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-light: #9ca3af;
    --border-color: #e5e7eb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
    --radius: 8px;
    --transition: 0.2s ease;
}

body.dark-mode {
    --light-bg: #111827;
    --light-surface: #1f2937;
    --text-primary: #f9fafb;
    --text-secondary: #d1d5db;
    --text-light: #9ca3af;
    --border-color: #374151;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--light-bg);
    color: var(--text-primary);
    line-height: 1.6;
    height: 100vh;
    overflow: hidden;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

.app-header {
    background: var(--light-surface);
    border-bottom: 1px solid var(--border-color);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-sm);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.header-left h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
}

.header-left h1 i { color: var(--warning-color); margin-right: 0.5rem; }

.header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border: none;
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    text-decoration: none;
}

.btn-primary { background: var(--primary-color); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--border-color); color: var(--text-primary); }
.btn-secondary:hover { background: var(--text-light); }
.btn-success { background: var(--success-color); color: #fff; }
.btn-success:hover { opacity: 0.9; }
.btn-warning { background: var(--warning-color); color: #fff; }
.btn-warning:hover { opacity: 0.9; }
.btn-danger { background: var(--danger-color); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-info { background: var(--info-color); color: #fff; }
.btn-info:hover { opacity: 0.9; }

.btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all var(--transition);
}
.btn-icon:hover { background: var(--border-color); color: var(--text-primary); }

.main-content {
    flex: 1;
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Controls Bar */
.controls-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--light-surface);
    flex-shrink: 0;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
}

.control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.control-group label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
}

.control-group input[type="number"],
.control-group select {
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 0.8rem;
    background: var(--light-bg);
    color: var(--text-primary);
    width: 80px;
}

.control-group input[type="number"]:focus,
.control-group select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
}

.toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border-color);
    border-radius: 22px;
    cursor: pointer;
    transition: var(--transition);
}
.toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: var(--transition);
}
.toggle-switch input:checked + .toggle-slider { background: var(--success-color); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Stats Cards */
.stats-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    flex-shrink: 0;
}

.stat-card {
    flex: 1;
    min-width: 140px;
    padding: 1rem;
    background: var(--light-surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    text-align: center;
}

.stat-card .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--primary-color);
}

.stat-card .stat-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
}

.stat-card-clickable {
    cursor: pointer;
    transition: all 0.15s ease;
}
.stat-card-clickable:hover {
    border-color: var(--primary-color);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
}
.stat-card-clickable.active {
    border-color: var(--primary-color);
    background: rgba(79, 70, 229, 0.05);
}

/* Account dropdown on stat card */
.stat-card-clickable { position: relative; }
.account-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    background: var(--light-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    z-index: 200;
    min-width: 180px;
    max-height: 200px;
    overflow-y: auto;
    padding: 0.3rem 0;
}
.account-dropdown.open { display: block; }
.account-dropdown .account-option {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-primary);
}
.account-dropdown .account-option:hover { background: var(--light-bg); }
.account-dropdown .account-option.selected {
    background: rgba(79, 70, 229, 0.1);
    font-weight: 600;
    color: var(--primary-color);
}

/* Search & Filters */
.filter-row {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.75rem;
    flex-shrink: 0;
}
.filter-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    flex-shrink: 0;
}
.search-container {
    position: relative;
    flex-shrink: 0;
    margin-bottom: 0.75rem;
}
.search-container input {
    width: 100%;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    font-size: 0.85rem;
    background: var(--light-surface);
    color: var(--text-primary);
}
.search-container input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
}
.search-container .search-icon {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
}
.search-container .search-clear {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-light);
    cursor: pointer;
    display: none;
    font-size: 0.85rem;
}
.search-container .search-clear.visible { display: block; }

/* Multi-select dropdown */
.multi-select {
    position: relative;
}
.multi-select-btn {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    font-size: 0.8rem;
    background: var(--light-surface);
    color: var(--text-primary);
    cursor: pointer;
    min-width: 120px;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
}
.multi-select-btn:hover { border-color: var(--primary-color); }
.multi-select-btn i { font-size: 0.65rem; margin-left: auto; }
.multi-select-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--light-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    z-index: 200;
    min-width: 200px;
    max-height: 250px;
    overflow-y: auto;
    padding: 0.4rem 0;
}
.multi-select-dropdown.open { display: block; }
.multi-select-dropdown label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
}
.multi-select-dropdown label:hover { background: var(--light-bg); }
.multi-select-dropdown input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--primary-color);
}

/* Selected type chips */
.type-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    align-items: center;
}
.type-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.5rem;
    background: var(--primary-color);
    color: #fff;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 500;
}
.type-chip .chip-remove {
    cursor: pointer;
    opacity: 0.8;
    font-size: 0.6rem;
}
.type-chip .chip-remove:hover { opacity: 1; }

/* Alert List */
.alert-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
    overflow-y: auto;
    padding-bottom: 1rem;
}

.alert-item {
    background: var(--light-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    transition: all 0.15s ease;
}
.alert-item:hover {
    border-color: var(--primary-color);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
}

.alert-header {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    cursor: pointer;
    gap: 1rem;
    user-select: none;
}

.alert-header:hover { background: var(--light-bg); border-radius: var(--radius); }

.alert-expand-icon {
    color: var(--text-light);
    transition: transform var(--transition);
    font-size: 0.75rem;
    width: 20px;
    text-align: center;
}
.alert-item.expanded .alert-expand-icon { transform: rotate(90deg); }

.alert-type-badge {
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    background: var(--warning-color);
    color: #fff;
    white-space: nowrap;
}

.alert-summary {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    min-width: 0;
}

.alert-router-name {
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--primary-color);
    white-space: nowrap;
    flex-shrink: 0;
}

.alert-title-tag {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    flex-shrink: 0;
}

.alert-friendly-info {
    font-size: 0.8rem;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
}

.alert-time {
    font-size: 0.75rem;
    color: var(--text-light);
    white-space: nowrap;
    margin-left: auto;
    flex-shrink: 0;
    padding-left: 1rem;
}

.alert-ack {
    flex-shrink: 0;
    padding-left: 0.75rem;
    display: flex;
    align-items: center;
}
.alert-ack label {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    cursor: pointer;
    font-size: 0.7rem;
    color: var(--text-light);
    white-space: nowrap;
}
.alert-ack input[type="checkbox"] {
    width: 14px;
    height: 14px;
    cursor: pointer;
    accent-color: var(--success-color);
}
.ack-time {
    font-size: 0.65rem;
    color: var(--success-color);
    margin-left: 0.3rem;
}
.alert-item.acked .alert-header {
    opacity: 0.6;
}

.alert-details {
    display: none;
    padding: 0.75rem 1rem 1rem;
    border-top: 1px solid var(--border-color);
    background: var(--light-bg);
    border-radius: 0 0 var(--radius) var(--radius);
}
.alert-item.expanded .alert-details { display: block; }

.alert-details-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
}

.detail-item {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 1rem;
    font-size: 0.8rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border-color);
}
.detail-item:last-child { border-bottom: none; }
.detail-item .detail-label {
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    text-transform: capitalize;
}
.detail-item .detail-value {
    color: var(--text-primary);
    word-break: break-all;
}

/* Loading */
.loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 500;
    align-items: center;
    justify-content: center;
}
.loading-overlay.visible { display: flex; }
.loading-spinner {
    background: var(--light-surface);
    padding: 2rem;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow-md);
}
.loading-spinner i { font-size: 2rem; color: var(--primary-color); }

/* Empty state */
.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-secondary);
}
.empty-state i { font-size: 3rem; margin-bottom: 1rem; color: var(--text-light); }
.empty-state h3 { margin-bottom: 0.5rem; }

/* Status indicator */
.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 0.4rem;
}
.status-dot.connected { background: var(--success-color); }
.status-dot.disconnected { background: var(--danger-color); }
.status-dot.refreshing { background: var(--warning-color); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Countdown */
.countdown-text {
    font-size: 0.75rem;
    color: var(--text-light);
}

/* Toast notification */
.toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    padding: 0.75rem 1.25rem;
    border-radius: var(--radius);
    color: #fff;
    font-size: 0.85rem;
    z-index: 1000;
    animation: slideIn 0.3s ease;
    box-shadow: var(--shadow-md);
}
.toast.success { background: var(--success-color); }
.toast.error { background: var(--danger-color); }
.toast.info { background: var(--info-color); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

/* Modal */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 900;
    align-items: center;
    justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
    background: var(--light-surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    width: 90%;
    max-width: 550px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 1.5rem;
}
.modal h2 {
    margin-bottom: 1rem;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.modal-field {
    margin-bottom: 0.75rem;
}
.modal-field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
}
.modal-field input {
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 0.85rem;
    background: var(--light-bg);
    color: var(--text-primary);
}
.modal-field input:focus {
    outline: none;
    border-color: var(--primary-color);
}
.modal-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    justify-content: flex-end;
    flex-wrap: wrap;
}
.profile-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
}
.profile-row input {
    flex: 1;
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 0.8rem;
    background: var(--light-bg);
    color: var(--text-primary);
}

/* Responsive */
@media (max-width: 768px) {
    .controls-bar { flex-direction: column; align-items: stretch; }
    .alert-summary { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
    .alert-time { margin-left: 0; }
    .stats-row { flex-direction: column; }
}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1><i class="fas fa-bell"></i> Alert Dashboard</h1>
                <span class="countdown-text" id="countdown-text"></span>
            </div>
            <div class="header-right">
                <span id="status-indicator"><span class="status-dot disconnected"></span>Not loaded</span>
                <button class="btn-icon" id="dark-mode-toggle" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="btn-icon" id="settings-btn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Controls -->
            <div class="controls-bar">
                <div class="control-group">
                    <label for="days-input">Time Range (days):</label>
                    <input type="number" id="days-input" min="1" max="90" value="30">
                </div>
                <div class="control-group">
                    <label>Auto-Refresh:</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autorefresh-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="control-group">
                    <label for="refresh-interval">Interval (sec):</label>
                    <input type="number" id="refresh-interval" min="10" max="600" value="60">
                </div>
                <button class="btn btn-primary" id="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                    <button class="btn btn-success" id="export-csv-btn">
                        <i class="fas fa-file-csv"></i> CSV
                    </button>
                    <button class="btn btn-info" id="export-json-btn">
                        <i class="fas fa-file-code"></i> JSON
                    </button>
                    <button class="btn btn-warning" id="export-html-btn">
                        <i class="fas fa-file-alt"></i> HTML
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">Total Alerts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-today">-</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-week">-</div>
                    <div class="stat-label">Last 7 Days</div>
                </div>
                <div class="stat-card stat-card-clickable" id="stat-account-card" title="Click to filter by account">
                    <div class="stat-value" id="stat-account">-</div>
                    <div class="stat-label">Account <i class="fas fa-filter" style="font-size:0.6rem; opacity:0.5;"></i></div>
                    <div class="account-dropdown" id="account-dropdown"></div>
                </div>
            </div>

            <!-- Filters Row: Type selector + chips -->
            <div class="filter-row">
                <div class="filter-left">
                    <div class="multi-select" id="filter-type-container">
                        <button type="button" class="multi-select-btn" id="filter-type-btn">
                            Alert Types <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="multi-select-dropdown" id="filter-type-dropdown"></div>
                    </div>
                    <div class="type-chips" id="type-chips"></div>
                </div>
            </div>

            <!-- Search bar -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search alerts...">
                <button class="search-clear" id="search-clear"><i class="fas fa-times"></i></button>
            </div>

            <!-- Alert List -->
            <div class="alert-list" id="alert-list">
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <h3>No alerts loaded</h3>
                    <p>Click Refresh or configure credentials in Settings.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Fetching alerts...</span>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2><i class="fas fa-cog"></i> Settings</h2>

            <h3 style="font-size:0.9rem; margin-bottom:0.5rem;">API Credentials</h3>
            <div class="modal-field">
                <label>X_CP_API_ID</label>
                <input type="text" id="cred-cp-api-id">
            </div>
            <div class="modal-field">
                <label>X_CP_API_KEY</label>
                <input type="password" id="cred-cp-api-key">
            </div>
            <div class="modal-field">
                <label>X_ECM_API_ID</label>
                <input type="text" id="cred-ecm-api-id">
            </div>
            <div class="modal-field">
                <label>X_ECM_API_KEY</label>
                <input type="password" id="cred-ecm-api-key">
            </div>

            <h3 style="font-size:0.9rem; margin:1rem 0 0.5rem;">Profiles</h3>
            <div class="profile-row">
                <input type="text" id="profile-name-input" placeholder="Profile name">
                <button class="btn btn-primary" id="profile-save-btn">Save</button>
                <button class="btn btn-secondary" id="profile-load-btn">Load</button>
                <button class="btn btn-danger" id="profile-delete-btn">Delete</button>
            </div>
            <select id="profile-select" style="width:100%; padding:0.4rem; margin-bottom:0.75rem; border:1px solid var(--border-color); border-radius:6px; background:var(--light-bg); color:var(--text-primary); font-size:0.8rem;">
                <option value="">-- Select a profile --</option>
            </select>

            <div class="modal-actions">
                <button class="btn btn-secondary" id="ssl-noverify-btn">
                    <i class="fas fa-shield-alt"></i> Disable SSL Verify
                </button>
                <button class="btn btn-primary" id="settings-apply-btn">
                    <i class="fas fa-check"></i> Apply & Refresh
                </button>
                <button class="btn btn-secondary" id="settings-close-btn">Close</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // --- State ---
        let alertsData = [];
        let filteredData = [];
        let acksData = {};  // {alertId: {acked_at, alert}}
        let lastFetchTimestamp = null;  // ISO string from server
        let autoRefreshTimer = null;
        let countdownTimer = null;
        let countdownSeconds = 0;
        let isRefreshing = false;

        // --- DOM refs ---
        const daysInput = document.getElementById('days-input');
        const autoRefreshToggle = document.getElementById('autorefresh-toggle');
        const refreshIntervalInput = document.getElementById('refresh-interval');
        const refreshBtn = document.getElementById('refresh-btn');
        const searchInput = document.getElementById('search-input');
        const searchClear = document.getElementById('search-clear');
        const filterTypeBtn = document.getElementById('filter-type-btn');
        const filterTypeDropdown = document.getElementById('filter-type-dropdown');
        const statAccountCard = document.getElementById('stat-account-card');
        const alertList = document.getElementById('alert-list');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusIndicator = document.getElementById('status-indicator');
        const countdownText = document.getElementById('countdown-text');
        const statTotal = document.getElementById('stat-total');
        const statToday = document.getElementById('stat-today');
        const statWeek = document.getElementById('stat-week');
        const statAccount = document.getElementById('stat-account');

        // Settings modal
        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsCloseBtn = document.getElementById('settings-close-btn');
        const settingsApplyBtn = document.getElementById('settings-apply-btn');
        const sslNoverifyBtn = document.getElementById('ssl-noverify-btn');
        const profileSelect = document.getElementById('profile-select');
        const profileNameInput = document.getElementById('profile-name-input');
        const profileSaveBtn = document.getElementById('profile-save-btn');
        const profileLoadBtn = document.getElementById('profile-load-btn');
        const profileDeleteBtn = document.getElementById('profile-delete-btn');

        // Dark mode
        const darkModeToggle = document.getElementById('dark-mode-toggle');

        // Export buttons
        const exportCsvBtn = document.getElementById('export-csv-btn');
        const exportJsonBtn = document.getElementById('export-json-btn');
        const exportHtmlBtn = document.getElementById('export-html-btn');

        // --- Dark Mode ---
        function initDarkMode() {
            const saved = localStorage.getItem('alertDashDarkMode');
            if (saved === 'true') {
                document.body.classList.add('dark-mode');
                darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('alertDashDarkMode', isDark);
            darkModeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // --- Toast ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // --- Status Indicator ---
        function setStatus(state, text) {
            const dotClass = state === 'connected' ? 'connected' :
                             state === 'refreshing' ? 'refreshing' : 'disconnected';
            statusIndicator.innerHTML = `<span class="status-dot ${dotClass}"></span> ${text}`;
        }

        // --- Fetch Alerts ---
        async function fetchAlerts(incremental = false) {
            if (isRefreshing) return;
            isRefreshing = true;
            loadingOverlay.classList.add('visible');
            setStatus('refreshing', 'Refreshing...');

            const days = Math.min(Math.max(parseInt(daysInput.value) || 30, 1), 90);
            daysInput.value = days;

            try {
                let url;
                if (incremental && lastFetchTimestamp) {
                    url = `/api/alerts?days=${days}&since=${encodeURIComponent(lastFetchTimestamp)}`;
                } else {
                    url = `/api/alerts?days=${days}`;
                }

                const resp = await fetch(url);
                const json = await resp.json();

                if (json.status === 'error') {
                    showToast(json.message || 'Error fetching alerts', 'error');
                    setStatus('disconnected', 'Error');
                    return;
                }

                if (json.incremental && json.data.length > 0) {
                    // Merge new alerts at the top, dedup by id
                    const existingIds = new Set(alertsData.map(a => a.id || a.created_at_timeuuid));
                    const newAlerts = json.data.filter(a => !existingIds.has(a.id || a.created_at_timeuuid));
                    alertsData = [...newAlerts, ...alertsData];
                    if (newAlerts.length > 0) {
                        showToast(`${newAlerts.length} new alert(s)`, 'info');
                    }
                } else if (!json.incremental) {
                    // Full refresh
                    alertsData = json.data || [];
                }

                lastFetchTimestamp = json.timestamp;

                // Populate filter dropdowns from response metadata
                if (json.filters && !json.incremental) {
                    populateTypeFilter(json.filters.types || []);
                    availableAccounts = json.filters.accounts || [];
                    updateAccountCardDisplay();
                }

                updateStats();
                applySearch();
                setStatus('connected', `${alertsData.length} alerts`);
                if (!json.incremental) {
                    showToast(`Loaded ${alertsData.length} alerts`, 'success');
                }
            } catch (err) {
                showToast('Network error: ' + err.message, 'error');
                setStatus('disconnected', 'Error');
            } finally {
                isRefreshing = false;
                loadingOverlay.classList.remove('visible');
            }
        }

        // --- Stats ---
        function updateStats() {
            statTotal.textContent = alertsData.length;

            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            let todayCount = 0, weekCount = 0;
            alertsData.forEach(a => {
                const created = new Date(a.created_at);
                if (created >= todayStart) todayCount++;
                if (created >= weekAgo) weekCount++;
            });
            statToday.textContent = todayCount;
            statWeek.textContent = weekCount;
        }

        // --- Search & Filters ---
        let selectedTypes = new Set();  // empty = all
        const typeChipsContainer = document.getElementById('type-chips');

        function populateTypeFilter(types) {
            filterTypeDropdown.innerHTML = '';
            types.forEach(t => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = t;
                cb.checked = selectedTypes.has(t);
                cb.addEventListener('change', () => {
                    if (cb.checked) selectedTypes.add(t);
                    else selectedTypes.delete(t);
                    updateTypeButtonLabel();
                    renderTypeChips();
                    applySearch();
                });
                label.appendChild(cb);
                label.appendChild(document.createTextNode(t));
                filterTypeDropdown.appendChild(label);
            });
        }

        function updateTypeButtonLabel() {
            // Always show "Alert Types" — selected types shown as chips
            filterTypeBtn.innerHTML = 'Alert Types <i class="fas fa-chevron-down"></i>';
        }

        function renderTypeChips() {
            if (selectedTypes.size === 0) {
                typeChipsContainer.innerHTML = '';
                return;
            }
            typeChipsContainer.innerHTML = [...selectedTypes].map(t =>
                `<span class="type-chip">${escapeHtml(t)}<span class="chip-remove" onclick="removeTypeFilter('${escapeHtml(t)}')"><i class="fas fa-times"></i></span></span>`
            ).join('');
        }

        window.removeTypeFilter = function(type) {
            selectedTypes.delete(type);
            updateTypeButtonLabel();
            renderTypeChips();
            // Uncheck in dropdown
            filterTypeDropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                if (cb.value === type) cb.checked = false;
            });
            applySearch();
        };

        // Toggle dropdown open/close
        filterTypeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            filterTypeDropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => {
            filterTypeDropdown.classList.remove('open');
        });
        filterTypeDropdown.addEventListener('click', (e) => e.stopPropagation());

        // Account filter state
        let availableAccounts = [];
        let selectedAccount = '';  // empty = all
        const accountDropdown = document.getElementById('account-dropdown');

        statAccountCard.addEventListener('click', (e) => {
            e.stopPropagation();
            accountDropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => {
            accountDropdown.classList.remove('open');
        });
        accountDropdown.addEventListener('click', (e) => e.stopPropagation());

        function populateAccountDropdown() {
            accountDropdown.innerHTML = '';
            // "All" option
            const allOpt = document.createElement('div');
            allOpt.className = 'account-option' + (selectedAccount === '' ? ' selected' : '');
            allOpt.textContent = 'All Accounts';
            allOpt.addEventListener('click', () => {
                selectedAccount = '';
                updateAccountCardDisplay();
                accountDropdown.classList.remove('open');
                applySearch();
            });
            accountDropdown.appendChild(allOpt);

            availableAccounts.forEach(name => {
                const opt = document.createElement('div');
                opt.className = 'account-option' + (selectedAccount === name ? ' selected' : '');
                opt.textContent = name;
                opt.addEventListener('click', () => {
                    selectedAccount = name;
                    updateAccountCardDisplay();
                    accountDropdown.classList.remove('open');
                    applySearch();
                });
                accountDropdown.appendChild(opt);
            });
        }

        function updateAccountCardDisplay() {
            if (!selectedAccount) {
                statAccount.textContent = availableAccounts.length === 1
                    ? availableAccounts[0]
                    : `All (${availableAccounts.length})`;
                statAccountCard.classList.remove('active');
            } else {
                statAccount.textContent = selectedAccount;
                statAccountCard.classList.add('active');
            }
            populateAccountDropdown();
        }

        function applySearch() {
            const query = searchInput.value.toLowerCase().trim();
            const accountFilter = selectedAccount;
            searchClear.classList.toggle('visible', query.length > 0);

            filteredData = alertsData.filter(a => {
                // Type filter (multi-select)
                if (selectedTypes.size > 0 && !selectedTypes.has(a.type || '')) return false;
                // Account filter (from stat card)
                if (accountFilter && (a.account_name || '') !== accountFilter) return false;
                // Text search
                if (query) {
                    const searchable = [
                        a.friendly_info || '',
                        a.info || '',
                        a.type || '',
                        a.router_name || '',
                        a.alert_title || '',
                        a.created_at || '',
                    ].join(' ').toLowerCase();
                    if (!searchable.includes(query)) return false;
                }
                return true;
            });
            renderAlerts();
        }

        searchInput.addEventListener('input', applySearch);
        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            applySearch();
        });

        // --- Render Alerts ---
        function renderAlerts() {
            // Preserve expanded state
            const expandedIds = new Set();
            alertList.querySelectorAll('.alert-item.expanded').forEach(el => {
                const id = el.getAttribute('data-alert-id');
                if (id) expandedIds.add(id);
            });

            if (filteredData.length === 0) {
                alertList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <h3>No alerts found</h3>
                        <p>${alertsData.length > 0 ? 'Try a different search.' : 'Click Refresh or configure credentials in Settings.'}</p>
                    </div>`;
                return;
            }

            alertList.innerHTML = filteredData.map((a, idx) => {
                try {
                const created = a.created_at ? new Date(a.created_at).toLocaleString() : 'Unknown';
                const friendly = a.friendly_info || '';
                const routerName = a.router_name || '';
                const alertTitle = a.alert_title || '';

                const alertId = a.id || a.created_at_timeuuid || String(idx);
                const isAcked = alertId in acksData;
                const isExpanded = expandedIds.has(alertId);
                const ackTime = isAcked && acksData[alertId]?.acked_at
                    ? new Date(acksData[alertId].acked_at).toLocaleString()
                    : '';

                return `
                <div class="alert-item ${isAcked ? 'acked' : ''} ${isExpanded ? 'expanded' : ''}" data-index="${idx}" data-alert-id="${escapeHtml(alertId)}">
                    <div class="alert-header" onclick="toggleAlert(this)">
                        <span class="alert-expand-icon"><i class="fas fa-chevron-right"></i></span>
                        <div class="alert-summary">
                            ${routerName ? `<span class="alert-router-name">${escapeHtml(routerName)}</span>` : ''}
                            ${alertTitle ? `<span class="alert-title-tag">${escapeHtml(alertTitle)}</span>` : ''}
                            <span class="alert-friendly-info">${escapeHtml(friendly)}</span>
                        </div>
                        <div class="alert-ack" onclick="event.stopPropagation()">
                            <label>
                                <input type="checkbox" ${isAcked ? 'checked' : ''} onchange="toggleAck(this, '${escapeHtml(alertId)}', ${idx})">
                                ACK
                            </label>
                            ${ackTime ? `<span class="ack-time">${ackTime}</span>` : ''}
                        </div>
                        <span class="alert-time">${created}</span>
                    </div>
                    <div class="alert-details">
                        <div class="alert-details-grid">
                            ${renderDetails(a)}
                        </div>
                    </div>
                </div>`;
                } catch(e) {
                    console.error('Render error for alert', idx, e);
                    return `<div class="alert-item"><div class="alert-header" style="padding:0.75rem 1rem;">Error rendering alert ${idx}: ${e.message}</div></div>`;
                }
            }).join('');
        }

        function renderDetails(alert) {
            // Fields to skip (noisy/redundant or shown in header)
            const skipKeys = ['resource_url', 'account', 'created_at_timeuuid', 'router_name', 'alert_title', 'router', 'info'];
            // Priority fields shown first
            const priorityKeys = ['friendly_info', 'type', 'created_at', 'detected_at', 'router_id', 'uptime'];

            // Extract uptime from info
            let uptime = '';
            const info = alert.info;
            if (typeof info === 'object' && info !== null) {
                uptime = info.uptime != null ? String(info.uptime) : '';
            } else if (typeof info === 'string') {
                try {
                    const parsed = JSON.parse(info);
                    if (parsed && parsed.uptime != null) uptime = String(parsed.uptime);
                } catch(e) {}
            }

            // Build a working copy with uptime injected
            const alertCopy = {...alert};
            if (uptime) {
                // Format uptime from seconds to human readable
                const secs = parseFloat(uptime);
                if (!isNaN(secs)) {
                    const days = Math.floor(secs / 86400);
                    const hrs = Math.floor((secs % 86400) / 3600);
                    const mins = Math.floor((secs % 3600) / 60);
                    alertCopy.uptime = `${days}d ${hrs}h ${mins}m`;
                } else {
                    alertCopy.uptime = uptime;
                }
            }

            let html = '';
            const shown = new Set();

            // Show priority fields first
            for (const key of priorityKeys) {
                if (!(key in alertCopy)) continue;
                shown.add(key);
                html += renderDetailRow(key, alertCopy[key]);
            }

            // Show remaining fields
            for (const [key, value] of Object.entries(alertCopy)) {
                if (skipKeys.includes(key) || shown.has(key)) continue;
                html += renderDetailRow(key, value);
            }
            return html;
        }

        function renderDetailRow(key, value) {
            let displayVal;
            const label = key.replace(/_/g, ' ');

            if (value === null || value === undefined) {
                displayVal = '<span style="color:var(--text-light)">-</span>';
            } else if (typeof value === 'object') {
                // Format JSON objects nicely
                const json = JSON.stringify(value, null, 2);
                displayVal = `<pre style="margin:0; white-space:pre-wrap; font-size:0.75rem; background:var(--light-surface); padding:0.4rem; border-radius:4px; border:1px solid var(--border-color);">${escapeHtml(json)}</pre>`;
                return `<div class="detail-item" style="grid-template-columns:160px 1fr;">
                    <span class="detail-label">${escapeHtml(label)}</span>
                    <span class="detail-value">${displayVal}</span>
                </div>`;
            } else {
                let str = String(value);
                // Make router URLs more readable
                if (key === 'router' && str.includes('/routers/')) {
                    const id = str.split('/').filter(Boolean).pop();
                    displayVal = escapeHtml(`Router ID: ${id}`);
                } else {
                    displayVal = escapeHtml(str);
                }
            }
            return `<div class="detail-item">
                <span class="detail-label">${escapeHtml(label)}</span>
                <span class="detail-value">${displayVal}</span>
            </div>`;
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        // Global function for onclick
        window.toggleAlert = function(headerEl) {
            const item = headerEl.closest('.alert-item');
            item.classList.toggle('expanded');
        };

        // ACK toggle
        window.toggleAck = async function(checkbox, alertId, idx) {
            const acked = checkbox.checked;
            const alert = filteredData[idx] || null;
            try {
                await fetch('/api/acks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: alertId, acked, alert})
                });
                if (acked) {
                    acksData[alertId] = {acked_at: new Date().toISOString(), alert};
                } else {
                    delete acksData[alertId];
                }
                // Update just this row's visual state
                const item = checkbox.closest('.alert-item');
                if (acked) {
                    item.classList.add('acked');
                    const ackLabel = checkbox.closest('.alert-ack');
                    let timeSpan = ackLabel.querySelector('.ack-time');
                    if (!timeSpan) {
                        timeSpan = document.createElement('span');
                        timeSpan.className = 'ack-time';
                        ackLabel.appendChild(timeSpan);
                    }
                    timeSpan.textContent = new Date().toLocaleString();
                } else {
                    item.classList.remove('acked');
                    const timeSpan = checkbox.closest('.alert-ack').querySelector('.ack-time');
                    if (timeSpan) timeSpan.remove();
                }
            } catch(e) {
                showToast('Failed to save ACK', 'error');
                checkbox.checked = !acked;
            }
        };

        async function loadAcks() {
            try {
                const resp = await fetch('/api/acks');
                acksData = await resp.json();
            } catch(e) { acksData = {}; }
        }

        // --- Auto-Refresh ---
        function startAutoRefresh() {
            stopAutoRefresh();
            if (!autoRefreshToggle.checked) {
                countdownText.textContent = '';
                return;
            }
            const interval = Math.max(10, parseInt(refreshIntervalInput.value) || 60);
            refreshIntervalInput.value = interval;
            countdownSeconds = interval;
            updateCountdown();

            countdownTimer = setInterval(() => {
                countdownSeconds--;
                updateCountdown();
                if (countdownSeconds <= 0) {
                    fetchAlerts(true);  // incremental on auto-refresh
                    countdownSeconds = interval;
                }
            }, 1000);
        }

        function stopAutoRefresh() {
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
            countdownText.textContent = '';
        }

        function updateCountdown() {
            if (autoRefreshToggle.checked && countdownSeconds > 0) {
                countdownText.textContent = `Next refresh: ${countdownSeconds}s`;
            } else {
                countdownText.textContent = '';
            }
        }

        autoRefreshToggle.addEventListener('change', startAutoRefresh);
        refreshIntervalInput.addEventListener('change', startAutoRefresh);

        refreshBtn.addEventListener('click', () => {
            fetchAlerts();
            if (autoRefreshToggle.checked) startAutoRefresh();
        });

        // --- Export: CSV ---
        exportCsvBtn.addEventListener('click', () => {
            if (filteredData.length === 0) { showToast('No data to export', 'error'); return; }
            const fields = ['created_at', 'type', 'friendly_info', 'info', 'detected_at', 'router', 'id'];
            let csv = fields.join(',') + '\n';
            filteredData.forEach(a => {
                csv += fields.map(f => {
                    let val = a[f] ?? '';
                    if (typeof val === 'object') val = JSON.stringify(val);
                    val = String(val).replace(/"/g, '""');
                    return `"${val}"`;
                }).join(',') + '\n';
            });
            downloadFile(csv, 'custom_alerts.csv', 'text/csv');
            showToast('CSV exported', 'success');
        });

        // --- Export: JSON ---
        exportJsonBtn.addEventListener('click', () => {
            if (filteredData.length === 0) { showToast('No data to export', 'error'); return; }
            const json = JSON.stringify(filteredData, null, 2);
            downloadFile(json, 'custom_alerts.json', 'application/json');
            showToast('JSON exported', 'success');
        });

        // --- Export: HTML ---
        exportHtmlBtn.addEventListener('click', () => {
            if (filteredData.length === 0) { showToast('No data to export', 'error'); return; }
            let html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Custom Alerts Export</title>
<style>
body { font-family: Inter, sans-serif; margin: 2rem; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.85rem; }
th { background: #4f46e5; color: white; }
tr:nth-child(even) { background: #f9fafb; }
h1 { color: #111827; }
</style></head><body>
<h1>Custom Alerts Export</h1>
<p>Generated: ${new Date().toLocaleString()} | Total: ${filteredData.length} alerts</p>
<table><thead><tr>
<th>Created</th><th>Type</th><th>Info</th><th>Router</th><th>Detected</th>
</tr></thead><tbody>`;
            filteredData.forEach(a => {
                html += `<tr>
<td>${escapeHtml(a.created_at || '')}</td>
<td>${escapeHtml(a.type || '')}</td>
<td>${escapeHtml(a.friendly_info || a.info || '')}</td>
<td>${escapeHtml(a.router || '')}</td>
<td>${escapeHtml(a.detected_at || '')}</td>
</tr>`;
            });
            html += '</tbody></table></body></html>';
            downloadFile(html, 'custom_alerts.html', 'text/html');
            showToast('HTML exported', 'success');
        });

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- Settings Modal ---
        settingsBtn.addEventListener('click', async () => {
            settingsModal.classList.add('visible');
            await loadCurrentCredentials();
            await loadProfileList();
        });
        settingsCloseBtn.addEventListener('click', () => settingsModal.classList.remove('visible'));
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) settingsModal.classList.remove('visible');
        });

        async function loadCurrentCredentials() {
            try {
                const resp = await fetch('/api/profiles/current');
                const data = await resp.json();
                document.getElementById('cred-cp-api-id').value = data.X_CP_API_ID?.value || '';
                document.getElementById('cred-cp-api-key').value = data.X_CP_API_KEY?.value || '';
                document.getElementById('cred-ecm-api-id').value = data.X_ECM_API_ID?.value || '';
                document.getElementById('cred-ecm-api-key').value = data.X_ECM_API_KEY?.value || '';
            } catch (e) { /* ignore */ }
        }

        async function loadProfileList() {
            try {
                const resp = await fetch('/api/profiles');
                const profiles = await resp.json();
                profileSelect.innerHTML = '<option value="">-- Select a profile --</option>';
                for (const name of Object.keys(profiles)) {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    profileSelect.appendChild(opt);
                }
            } catch (e) { /* ignore */ }
        }

        settingsApplyBtn.addEventListener('click', async () => {
            const creds = {
                X_CP_API_ID: document.getElementById('cred-cp-api-id').value.trim(),
                X_CP_API_KEY: document.getElementById('cred-cp-api-key').value.trim(),
                X_ECM_API_ID: document.getElementById('cred-ecm-api-id').value.trim(),
                X_ECM_API_KEY: document.getElementById('cred-ecm-api-key').value.trim(),
            };
            try {
                await fetch('/api/credentials/apply', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({credentials: creds})
                });
                settingsModal.classList.remove('visible');
                showToast('Credentials applied', 'success');
                fetchAlerts();
                if (autoRefreshToggle.checked) startAutoRefresh();
            } catch (e) {
                showToast('Failed to apply credentials', 'error');
            }
        });

        profileSaveBtn.addEventListener('click', async () => {
            const name = profileNameInput.value.trim() || profileSelect.value;
            if (!name) { showToast('Enter a profile name', 'error'); return; }
            const creds = {
                X_CP_API_ID: document.getElementById('cred-cp-api-id').value.trim(),
                X_CP_API_KEY: document.getElementById('cred-cp-api-key').value.trim(),
                X_ECM_API_ID: document.getElementById('cred-ecm-api-id').value.trim(),
                X_ECM_API_KEY: document.getElementById('cred-ecm-api-key').value.trim(),
            };
            try {
                let resp = await fetch('/api/profiles', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, credentials: creds})
                });
                if (resp.status === 409) {
                    if (confirm(`Profile "${name}" exists. Overwrite?`)) {
                        resp = await fetch('/api/profiles', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({name, credentials: creds, overwrite: true})
                        });
                    } else return;
                }
                showToast(`Profile "${name}" saved`, 'success');
                await loadProfileList();
            } catch (e) { showToast('Failed to save profile', 'error'); }
        });

        profileLoadBtn.addEventListener('click', async () => {
            const name = profileSelect.value;
            if (!name) { showToast('Select a profile first', 'error'); return; }
            try {
                await fetch('/api/profiles/load', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name})
                });
                showToast(`Profile "${name}" loaded`, 'success');
                await loadCurrentCredentials();
            } catch (e) { showToast('Failed to load profile', 'error'); }
        });

        profileDeleteBtn.addEventListener('click', async () => {
            const name = profileSelect.value;
            if (!name) { showToast('Select a profile first', 'error'); return; }
            if (!confirm(`Delete profile "${name}"?`)) return;
            try {
                await fetch(`/api/profiles/${encodeURIComponent(name)}`, { method: 'DELETE' });
                showToast(`Profile "${name}" deleted`, 'success');
                await loadProfileList();
            } catch (e) { showToast('Failed to delete profile', 'error'); }
        });

        sslNoverifyBtn.addEventListener('click', async () => {
            try {
                await fetch('/api/ssl-noverify', { method: 'POST' });
                showToast('SSL verification disabled', 'info');
            } catch (e) { showToast('Failed', 'error'); }
        });

        // --- Initialize ---
        initDarkMode();
        loadAcks().then(() => fetchAlerts());
        startAutoRefresh();

    })();
    </script>
</body>
</html>
