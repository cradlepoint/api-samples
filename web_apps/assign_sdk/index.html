<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign SDK App to Groups</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #3730a3;
            --secondary-color: #6b7280;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --info-color: #0284c7;
            --dark-bg: #111827;
            --dark-surface: #1f2937;
            --light-bg: #f9fafb;
            --light-surface: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --border-color: #d1d5db;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark-mode {
            --light-bg: #111827;
            --light-surface: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-light: #6b7280;
            --border-color: #374151;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border-color);
        }
        .app-header h1 {
            font-size: 1.75rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--info-color));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .dark-mode-toggle {
            background: var(--light-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 0.5rem 1rem; cursor: pointer;
            color: var(--text-primary); font-size: 0.875rem; transition: var(--transition);
        }
        .dark-mode-toggle:hover { background: var(--border-color); }
        .panel {
            background: var(--light-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .panel h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-primary); }
        .step-label {
            display: inline-block; background: var(--primary-color); color: white;
            font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.6rem;
            border-radius: var(--radius-sm); margin-right: 0.5rem;
        }
        .app-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        .app-item {
            display: flex; align-items: center; padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color); cursor: pointer; transition: var(--transition);
        }
        .app-item:last-child { border-bottom: none; }
        .app-item:hover { background: var(--light-bg); }
        .app-item.selected { background: rgba(79, 70, 229, 0.1); border-left: 3px solid var(--primary-color); }
        .app-item input[type="radio"] { margin-right: 0.75rem; accent-color: var(--primary-color); }
        .app-item-info { flex: 1; }
        .app-item-name { font-weight: 500; color: var(--text-primary); }
        .app-item-version { font-size: 0.8125rem; color: var(--text-secondary); }
        .groups-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem;
        }
        .groups-toolbar-left { display: flex; align-items: center; gap: 1rem; }
        .select-all-label {
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            font-size: 0.875rem; font-weight: 500; color: var(--text-primary);
        }
        .select-all-label input[type="checkbox"] { accent-color: var(--primary-color); width: 1rem; height: 1rem; }
        .selected-count {
            font-size: 0.8125rem; color: var(--text-secondary);
            background: var(--light-bg); padding: 0.25rem 0.75rem; border-radius: var(--radius-sm);
        }
        .group-search {
            padding: 0.5rem 0.75rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); font-size: 0.875rem;
            background: var(--light-surface); color: var(--text-primary);
            min-width: 200px; transition: var(--transition);
        }
        .group-search:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .group-list { border: 1px solid var(--border-color); border-radius: var(--radius-md); max-height: 400px; overflow-y: auto; }
        .group-item {
            display: flex; align-items: center; padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border-color); transition: var(--transition);
        }
        .group-item:last-child { border-bottom: none; }
        .group-item:hover { background: var(--light-bg); }
        .group-item input[type="checkbox"] { margin-right: 0.75rem; accent-color: var(--primary-color); width: 1rem; height: 1rem; }
        .group-item-name { font-size: 0.875rem; color: var(--text-primary); }
        .group-item-id { font-size: 0.75rem; color: var(--text-light); margin-left: 0.5rem; }
        .hierarchy-header {
            padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-secondary); background: var(--light-bg);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1;
            cursor: pointer; user-select: none; display: flex; align-items: center; gap: 0.5rem;
        }
        .hierarchy-header:hover { color: var(--primary-color); }
        .hierarchy-header .collapse-arrow {
            display: inline-block; transition: transform 0.2s ease; font-size: 0.625rem;
        }
        .hierarchy-header.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .hierarchy-section.collapsed { display: none; }
        .hierarchy-subheader {
            padding: 0.4rem 1rem 0.4rem 1.5rem; font-size: 0.8125rem; font-weight: 500;
            color: var(--primary-color); background: var(--light-surface);
            border-bottom: 1px solid var(--border-color);
        }
        .pagination {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);
        }
        .pagination button {
            padding: 0.4rem 0.75rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); background: var(--light-surface);
            color: var(--text-primary); cursor: pointer; font-size: 0.8125rem; transition: var(--transition);
        }
        .pagination button:hover:not(:disabled) { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination button.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .pagination-info { font-size: 0.8125rem; color: var(--text-secondary); margin: 0 0.5rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-md);
            font-size: 0.875rem; font-weight: 500; cursor: pointer;
            transition: var(--transition); box-shadow: var(--shadow-sm);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(135deg, var(--success-color), #047857); color: white; }
        .btn-success:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .results-panel { display: none; }
        .results-panel.visible { display: block; }
        .result-item {
            display: flex; align-items: center; padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm); margin-bottom: 0.25rem;
            font-size: 0.8125rem; font-family: 'Monaco', 'Menlo', monospace;
        }
        .result-item.success { background: rgba(5, 150, 105, 0.1); color: var(--success-color); }
        .result-item.error { background: rgba(220, 38, 38, 0.1); color: var(--danger-color); }
        body.dark-mode .result-item.success { background: rgba(5, 150, 105, 0.2); color: #34d399; }
        body.dark-mode .result-item.error { background: rgba(220, 38, 38, 0.2); color: #fca5a5; }
        .results-summary {
            margin-top: 1rem; padding: 0.75rem 1rem; background: var(--light-bg);
            border-radius: var(--radius-md); font-size: 0.875rem; color: var(--text-secondary);
        }
        .results-log { max-height: 300px; overflow-y: auto; margin-top: 0.75rem; }
        .loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
        .loading::after {
            content: ''; display: inline-block; width: 1.25rem; height: 1.25rem;
            border: 2px solid var(--border-color); border-top-color: var(--primary-color);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-left: 0.5rem; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            color: var(--danger-color); padding: 1rem; background: rgba(220, 38, 38, 0.1);
            border-radius: var(--radius-md); font-size: 0.875rem;
        }
        @media (max-width: 768px) {
            .app-container { padding: 1rem; }
            .groups-toolbar { flex-direction: column; align-items: flex-start; }
            .group-search { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Assign SDK App to Groups</h1>
            <button class="dark-mode-toggle" id="darkModeToggle">&#127769; Dark Mode</button>
        </header>
        <div class="panel" id="appPanel">
            <h2><span class="step-label">Step 1</span> Select SDK App Version</h2>
            <div id="appListContainer"><div class="loading">Loading apps...</div></div>
        </div>
        <div class="panel" id="groupPanel">
            <h2><span class="step-label">Step 2</span> Select Groups</h2>
            <div class="groups-toolbar">
                <div class="groups-toolbar-left">
                    <label class="select-all-label">
                        <input type="checkbox" id="selectAllCheckbox"> Select All Groups
                    </label>
                    <span class="selected-count" id="selectedCount">0 selected</span>
                </div>
                <input type="text" class="group-search" id="groupSearch" placeholder="Search groups...">
            </div>
            <div id="groupListContainer"><div class="loading">Loading groups...</div></div>
            <div class="pagination" id="pagination" style="display: none;"></div>
        </div>
        <div class="panel">
            <h2><span class="step-label">Step 3</span> Assign App to Groups</h2>
            <p style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
                Select an app version above and one or more groups, then click Assign.
            </p>
            <button class="btn btn-success" id="assignBtn" disabled>Assign App to Selected Groups</button>
        </div>
        <div class="panel results-panel" id="resultsPanel">
            <h2>Assignment Results</h2>
            <div class="results-summary" id="resultsSummary"></div>
            <div class="results-log" id="resultsLog"></div>
        </div>
    </div>
    <script>
    (function() {
        var allApps = [];
        var allGroups = [];
        var filteredGroups = [];
        var selectedAppVersion = null;
        var selectedGroupIds = new Set();
        var accountUrl = '';
        var currentPage = 1;
        var pageSize = 100;
        var collapsedApps = {};
        var collapsedGroups = {};

        var darkModeToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            darkModeToggle.innerHTML = '&#9728;&#65039; Light Mode';
        }
        darkModeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            var isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            darkModeToggle.innerHTML = isDark ? '&#9728;&#65039; Light Mode' : '&#127769; Dark Mode';
        });

        function fetchJSON(url, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.error) callback(new Error(data.error), null);
                    else callback(null, data);
                } else { callback(new Error('HTTP ' + xhr.status), null); }
            };
            xhr.onerror = function() { callback(new Error('Network error'), null); };
            xhr.send();
        }

        function postJSON(url, body, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() { callback(null, JSON.parse(xhr.responseText)); };
            xhr.onerror = function() { callback(new Error('Network error'), null); };
            xhr.send(JSON.stringify(body));
        }

        function loadApps() {
            fetchJSON('/api/device_apps', function(err, data) {
                var container = document.getElementById('appListContainer');
                if (err) { container.innerHTML = '<div class="error-msg">Error loading apps: ' + escapeHtml(err.message) + '</div>'; return; }
                allApps = data.data || [];
                // Collapse all accounts by default
                for (var i = 0; i < allApps.length; i++) {
                    var acct = allApps[i].account_name || 'Unknown Account';
                    if (!(acct in collapsedApps)) collapsedApps[acct] = true;
                }
                renderApps();
            });
        }

        function loadGroups() {
            fetchJSON('/api/groups', function(err, data) {
                var container = document.getElementById('groupListContainer');
                if (err) { container.innerHTML = '<div class="error-msg">Error loading groups: ' + escapeHtml(err.message) + '</div>'; return; }
                allGroups = data.data || [];
                filteredGroups = allGroups.slice();
                // Collapse all accounts by default
                for (var i = 0; i < allGroups.length; i++) {
                    var acct = allGroups[i].account_name || 'Unknown Account';
                    if (!(acct in collapsedGroups)) collapsedGroups[acct] = true;
                }
                renderGroups();
            });
        }

        function loadAccounts() {
            fetchJSON('/api/accounts', function(err, data) {
                if (err) { console.error('Error loading accounts:', err); return; }
                var accounts = data.data || [];
                if (accounts.length > 0) accountUrl = accounts[0].resource_url;
            });
        }

        function renderApps() {
            var container = document.getElementById('appListContainer');
            if (allApps.length === 0) { container.innerHTML = '<div class="error-msg">No SDK apps found in this account.</div>'; return; }
            var html = '<div class="app-list">';
            var lastAccount = '';
            var lastAppKey = '';
            var sectionOpen = false;
            for (var i = 0; i < allApps.length; i++) {
                var app = allApps[i];
                var acctName = app.account_name || 'Unknown Account';
                var appKey = (app.app_description || app.app_name || '').toLowerCase();
                if (acctName !== lastAccount) {
                    if (sectionOpen) html += '</div>';
                    var collapseState = collapsedApps[acctName] ? ' collapsed' : '';
                    html += '<div class="hierarchy-header' + collapseState + '" data-account="' + escapeHtml(acctName) + '"><span class="collapse-arrow">&#9660;</span> ' + escapeHtml(acctName) + '</div>';
                    html += '<div class="hierarchy-section' + collapseState + '" data-account-section="' + escapeHtml(acctName) + '">';
                    sectionOpen = true;
                    lastAccount = acctName;
                    lastAppKey = '';
                }
                if (appKey !== lastAppKey) {
                    var displayName = app.app_name + (app.app_description ? ' — ' + app.app_description : '');
                    html += '<div class="hierarchy-subheader">' + escapeHtml(displayName) + '</div>';
                    lastAppKey = appKey;
                }
                var selected = selectedAppVersion && selectedAppVersion.id === app.id;
                html += '<div class="app-item' + (selected ? ' selected' : '') + '" data-idx="' + i + '">';
                html += '<input type="radio" name="app_version" ' + (selected ? 'checked' : '') + '>';
                html += '<div class="app-item-info">';
                html += '<div class="app-item-version">Version: ' + escapeHtml(app.version) + ' (ID: ' + app.id + ')</div></div></div>';
            }
            if (sectionOpen) html += '</div>';
            html += '</div>';
            container.innerHTML = html;
            // Bind collapse toggles
            var headers = container.querySelectorAll('.hierarchy-header');
            for (var h = 0; h < headers.length; h++) {
                (function(hdr) {
                    hdr.addEventListener('click', function() {
                        var acct = hdr.getAttribute('data-account');
                        collapsedApps[acct] = !collapsedApps[acct];
                        var scrollTop = container.querySelector('.app-list').scrollTop;
                        renderApps();
                        var list = container.querySelector('.app-list');
                        if (list) list.scrollTop = scrollTop;
                    });
                })(headers[h]);
            }
            var items = container.querySelectorAll('.app-item');
            for (var j = 0; j < items.length; j++) {
                (function(el) {
                    el.addEventListener('click', function() {
                        selectedAppVersion = allApps[parseInt(el.getAttribute('data-idx'))];
                        renderApps();
                        updateAssignButton();
                    });
                })(items[j]);
            }
        }

        function renderGroups() {
            var container = document.getElementById('groupListContainer');
            var paginationEl = document.getElementById('pagination');
            paginationEl.style.display = 'none';
            if (filteredGroups.length === 0) { container.innerHTML = '<div class="error-msg">No groups found.</div>'; return; }
            var html = '<div class="group-list">';
            var lastAccount = '';
            var sectionOpen = false;
            for (var i = 0; i < filteredGroups.length; i++) {
                var group = filteredGroups[i];
                var acctName = group.account_name || 'Unknown Account';
                if (acctName !== lastAccount) {
                    if (sectionOpen) html += '</div>';
                    var collapseState = collapsedGroups[acctName] ? ' collapsed' : '';
                    html += '<div class="hierarchy-header' + collapseState + '" data-account="' + escapeHtml(acctName) + '"><span class="collapse-arrow">&#9660;</span> ' + escapeHtml(acctName) + ' <span style="font-weight:400;opacity:0.7">(' + countGroupsForAccount(acctName) + ')</span></div>';
                    html += '<div class="hierarchy-section' + collapseState + '" data-account-section="' + escapeHtml(acctName) + '">';
                    sectionOpen = true;
                    lastAccount = acctName;
                }
                var checked = selectedGroupIds.has(group.id);
                html += '<div class="group-item"><input type="checkbox" data-group-id="' + group.id + '" ' + (checked ? 'checked' : '') + '>';
                html += '<span class="group-item-name">' + escapeHtml(group.name) + '</span>';
                html += '<span class="group-item-id">(ID: ' + group.id + ')</span></div>';
            }
            if (sectionOpen) html += '</div>';
            html += '</div>';
            container.innerHTML = html;
            // Bind collapse toggles for groups
            var gHeaders = container.querySelectorAll('.hierarchy-header');
            for (var h = 0; h < gHeaders.length; h++) {
                (function(hdr) {
                    hdr.addEventListener('click', function() {
                        var acct = hdr.getAttribute('data-account');
                        collapsedGroups[acct] = !collapsedGroups[acct];
                        var scrollTop = container.querySelector('.group-list').scrollTop;
                        renderGroups();
                        var list = container.querySelector('.group-list');
                        if (list) list.scrollTop = scrollTop;
                    });
                })(gHeaders[h]);
            }
            var checkboxes = container.querySelectorAll('input[type="checkbox"]');
            for (var j = 0; j < checkboxes.length; j++) {
                (function(cb) {
                    cb.addEventListener('change', function() {
                        var groupId = parseInt(cb.getAttribute('data-group-id'));
                        if (cb.checked) selectedGroupIds.add(groupId);
                        else selectedGroupIds.delete(groupId);
                        updateSelectAllState();
                        updateSelectedCount();
                        updateAssignButton();
                    });
                })(checkboxes[j]);
            }
        }

        function countGroupsForAccount(acctName) {
            var count = 0;
            for (var i = 0; i < filteredGroups.length; i++) {
                if ((filteredGroups[i].account_name || 'Unknown Account') === acctName) count++;
            }
            return count;
        }

        function renderPagination(totalPages) {
            var paginationEl = document.getElementById('pagination');
            if (totalPages <= 1) { paginationEl.style.display = 'none'; return; }
            paginationEl.style.display = 'flex';
            var html = '<button id="prevPage" ' + (currentPage === 1 ? 'disabled' : '') + '>&laquo; Prev</button>';
            var maxVisible = 7;
            var startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            var endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);
            if (startPage > 1) {
                html += '<button class="page-btn" data-page="1">1</button>';
                if (startPage > 2) html += '<span class="pagination-info">...</span>';
            }
            for (var i = startPage; i <= endPage; i++) {
                html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
            }
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<span class="pagination-info">...</span>';
                html += '<button class="page-btn" data-page="' + totalPages + '">' + totalPages + '</button>';
            }
            html += '<button id="nextPage" ' + (currentPage === totalPages ? 'disabled' : '') + '>Next &raquo;</button>';
            html += '<span class="pagination-info">(' + filteredGroups.length + ' groups)</span>';
            paginationEl.innerHTML = html;
            var prevBtn = document.getElementById('prevPage');
            var nextBtn = document.getElementById('nextPage');
            if (prevBtn) prevBtn.addEventListener('click', function() { currentPage--; renderGroups(); });
            if (nextBtn) nextBtn.addEventListener('click', function() { currentPage++; renderGroups(); });
            var pageBtns = paginationEl.querySelectorAll('.page-btn');
            for (var k = 0; k < pageBtns.length; k++) {
                (function(btn) { btn.addEventListener('click', function() { currentPage = parseInt(btn.getAttribute('data-page')); renderGroups(); }); })(pageBtns[k]);
            }
        }

        var selectAllCheckbox = document.getElementById('selectAllCheckbox');
        selectAllCheckbox.addEventListener('change', function() {
            if (selectAllCheckbox.checked) {
                for (var i = 0; i < filteredGroups.length; i++) selectedGroupIds.add(filteredGroups[i].id);
            } else {
                for (var i = 0; i < filteredGroups.length; i++) selectedGroupIds.delete(filteredGroups[i].id);
            }
            renderGroups();
            updateSelectedCount();
            updateAssignButton();
        });

        function updateSelectAllState() {
            var allSelected = filteredGroups.length > 0;
            var someSelected = false;
            for (var i = 0; i < filteredGroups.length; i++) {
                if (selectedGroupIds.has(filteredGroups[i].id)) someSelected = true;
                else allSelected = false;
            }
            selectAllCheckbox.checked = allSelected;
            selectAllCheckbox.indeterminate = someSelected && !allSelected;
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedGroupIds.size + ' selected';
        }

        var groupSearch = document.getElementById('groupSearch');
        groupSearch.addEventListener('input', function() {
            var query = groupSearch.value.toLowerCase().trim();
            if (query === '') { filteredGroups = allGroups.slice(); }
            else {
                filteredGroups = [];
                for (var i = 0; i < allGroups.length; i++) {
                    if (allGroups[i].name.toLowerCase().indexOf(query) !== -1 || String(allGroups[i].id).indexOf(query) !== -1) filteredGroups.push(allGroups[i]);
                }
            }
            currentPage = 1;
            renderGroups();
            updateSelectAllState();
        });

        var assignBtn = document.getElementById('assignBtn');
        function updateAssignButton() { assignBtn.disabled = !selectedAppVersion || selectedGroupIds.size === 0; }

        assignBtn.addEventListener('click', function() {
            if (!selectedAppVersion || selectedGroupIds.size === 0) return;
            if (!accountUrl) { alert('No account URL found. Ensure your API keys have access to at least one account.'); return; }
            if (!confirm('Assign "' + selectedAppVersion.app_name + ' v' + selectedAppVersion.version + '" to ' + selectedGroupIds.size + ' group(s)?')) return;
            assignBtn.disabled = true;
            assignBtn.textContent = 'Assigning...';
            var resultsPanel = document.getElementById('resultsPanel');
            var resultsLog = document.getElementById('resultsLog');
            var resultsSummary = document.getElementById('resultsSummary');
            resultsPanel.classList.add('visible');
            resultsLog.innerHTML = '';
            resultsSummary.textContent = 'Processing...';
            var groupIdsArray = [];
            selectedGroupIds.forEach(function(id) { groupIdsArray.push(id); });
            postJSON('/api/assign', { app_version_url: selectedAppVersion.resource_url, account_url: accountUrl, group_ids: groupIdsArray }, function(err, response) {
                if (err || response.error) {
                    resultsSummary.textContent = 'Error: ' + (err ? err.message : response.error);
                    assignBtn.disabled = false; assignBtn.textContent = 'Assign App to Selected Groups'; updateAssignButton(); return;
                }
                var results = response.results || [];
                var successCount = 0, failCount = 0;
                for (var i = 0; i < results.length; i++) {
                    var r = results[i];
                    var div = document.createElement('div');
                    div.className = 'result-item ' + r.status;
                    div.textContent = r.message;
                    resultsLog.appendChild(div);
                    if (r.status === 'success') successCount++; else failCount++;
                }
                resultsSummary.textContent = 'Complete: ' + successCount + ' succeeded, ' + failCount + ' failed. Log: ' + (response.log_file || 'N/A');
                assignBtn.disabled = false; assignBtn.textContent = 'Assign App to Selected Groups'; updateAssignButton();
            });
        });

        function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

        loadAccounts();
        loadApps();
        loadGroups();
    })();
    </script>
</body>
</html>
